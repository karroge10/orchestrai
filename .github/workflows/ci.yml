name: Windows CI
on:
  push:
  pull_request:
jobs:
  verify:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npm run check
      - run: npm run build
      - run: npm run pack
      - run: npm run smoke:packaged
      - uses: actions/upload-artifact@v4
        with:
          name: unpacked-windows-app
          path: dist/win-unpacked
  safe-e2e:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npm run test:e2e
